{% extends 'campaigns/base.html' %}
{% block title %}Delete Contact Upload{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 text-center p-5">
            <i class="bi bi-exclamation-triangle text-danger" style="font-size: 3rem;"></i>
            <h5 class="fw-bold mt-3">Delete Contact Upload</h5>
            <p class="text-muted">Are you sure you want to delete <strong>{{ upload.name }}</strong>?<br>
            This will remove all {{ upload.contacts.count }} contacts.</p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex justify-content-center gap-2">
                    <a href="{% url 'contact_upload_list' %}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-danger">Delete Forever</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
