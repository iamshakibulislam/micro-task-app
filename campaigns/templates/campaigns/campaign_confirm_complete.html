{% extends 'campaigns/base.html' %}
{% block title %}Complete Campaign{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 text-center p-5">
            <i class="bi bi-flag-fill text-success" style="font-size: 3rem;"></i>
            <h5 class="fw-bold mt-3">Complete Campaign</h5>
            <p class="text-muted">Mark <strong>{{ campaign.name }}</strong> as completed?<br>All pending tasks will be marked as completed and the campaign will be disabled.</p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex justify-content-center gap-2">
                    <a href="{% url 'campaign_detail' campaign.id %}" class="btn btn-outline-secondary">Cancel</a>
                    <button type="submit" class="btn btn-success">Complete Campaign</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
