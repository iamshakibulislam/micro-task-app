<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Campaign Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            padding: 2rem;
        }
        .login-card .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .brand-icon {
            width: 56px;
            height: 56px;
            background: #0a66c2;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }
        .brand-icon i { font-size: 1.8rem; color: white; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="card">
            <div class="card-body p-4">
                <div class="brand-icon mb-3">
                    <i class="bi bi-linkedin"></i>
                </div>
                <h5 class="text-center fw-bold mb-1">Campaign Hub</h5>
                <p class="text-center text-muted small mb-4">Sign in to manage your campaigns</p>

                {% if form.errors %}
                <div class="alert alert-danger py-2 small">
                    Invalid username or password. Please try again.
                </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small fw-medium">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-medium">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-medium">
                        <i class="bi bi-box-arrow-in-right"></i> Sign In
                    </button>
                </form>

                <div class="text-center mt-3">
                    <small class="text-muted">Don't have an account? <a href="{% url 'signup' %}" class="text-decoration-none">Sign up</a></small>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
